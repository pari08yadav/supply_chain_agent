version: '3.8'

services:
  # --- Graph Database ---
  neo4j:
    image: neo4j:5.18.0
    container_name: sc_neo4j
    ports:
      - "7475:7474" # Browser UI now at 7475
      - "7688:7687" # Bolt connection now at 7688
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - ./data/neo4j:/data

  # --- Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sc_qdrant
    ports:
      - "6333:6333" # REST API
    volumes:
      - ./data/qdrant_storage:/qdrant/storage

volumes:
  neo4j_data:
  qdrant_storage: